<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guest Wi-Fi</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Geist',-apple-system,sans-serif;background:#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;-webkit-font-smoothing:antialiased}
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.aurora::before,.aurora::after{content:'';position:absolute;width:600px;height:600px;border-radius:50%;filter:blur(120px);opacity:.55;will-change:transform}
.aurora::before{background:radial-gradient(circle,#007AFF 0%,transparent 70%);top:-200px;left:-150px;animation:d1 18s ease-in-out infinite}
.aurora::after{background:radial-gradient(circle,#0051a8 0%,transparent 70%);bottom:-250px;right:-150px;animation:d2 22s ease-in-out infinite}
.a3{position:absolute;width:500px;height:500px;border-radius:50%;filter:blur(140px);background:radial-gradient(circle,rgba(0,122,255,.4) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:p 8s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(80px,60px) scale(1.15)}}
@keyframes d2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-100px,-80px) scale(1.2)}}
@keyframes p{0%,100%{opacity:.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:.6;transform:translate(-50%,-50%) scale(1.15)}}
.grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse,#000 30%,transparent 75%);-webkit-mask-image:radial-gradient(ellipse,#000 30%,transparent 75%)}
.grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.4;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E")}
.pts{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.pt{position:absolute;width:4px;height:4px;border-radius:50%;background:#007AFF;box-shadow:0 0 8px rgba(0,122,255,.5);opacity:0;animation:fl 14s linear infinite}
@keyframes fl{0%{transform:translateY(110vh);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(-10vh) translateX(40px);opacity:0}}
@keyframes rise{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes glow{0%,100%{box-shadow:0 0 12px rgba(0,122,255,.5),0 0 24px rgba(0,122,255,.5)}50%{box-shadow:0 0 20px rgba(0,122,255,.7),0 0 40px rgba(0,122,255,.4)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderGlow{0%,100%{border-color:rgba(0,122,255,.15)}50%{border-color:rgba(0,122,255,.4)}}
@keyframes shake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-3px)}40%,60%{transform:translateX(3px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sonar{0%{width:32px;height:32px;opacity:.9;border-width:3px}100%{width:140px;height:140px;opacity:0;border-width:1px}}
@keyframes cp{0%,100%{transform:scale(1)}50%{transform:scale(.9)}}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes bars{0%,100%{opacity:.3}50%{opacity:1}}
.card{position:relative;z-index:10;width:100%;max-width:380px;text-align:center}
.logo-wrap{margin-bottom:36px;opacity:0;animation:rise .9s .05s cubic-bezier(.2,.8,.2,1) forwards}
.logo{display:inline-flex;align-items:center;gap:8px;font-weight:900;font-size:22px;letter-spacing:-.02em}
.logo-dot{width:8px;height:8px;border-radius:50%;background:#007AFF;animation:glow 3s ease-in-out infinite,blink 2s ease-in-out infinite}
h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:56px;line-height:1;letter-spacing:-.02em;margin-bottom:14px;opacity:0;animation:rise .9s .15s cubic-bezier(.2,.8,.2,1) forwards}
h1 em{font-style:italic;color:#007AFF;position:relative}
h1 em::after{content:'';position:absolute;inset:-8px -4px;background:#007AFF;filter:blur(28px);opacity:.35;z-index:-1;border-radius:8px}
.sub{color:#8a8a92;margin-bottom:36px;font-size:15px;line-height:1.5;opacity:0;animation:rise .9s .25s cubic-bezier(.2,.8,.2,1) forwards}
.panel{position:relative;background:rgba(20,20,22,.6);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px;opacity:0;animation:rise .9s .35s cubic-bezier(.2,.8,.2,1) forwards}
.panel::before{content:'';position:absolute;inset:0;border-radius:22px;padding:1px;background:linear-gradient(135deg,rgba(0,122,255,.4),transparent 40%,transparent 60%,rgba(0,122,255,.2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.field{position:relative;margin-bottom:12px}
.field input{width:100%;padding:18px 18px 18px 48px;border:1px solid rgba(255,255,255,.06);border-radius:14px;font-size:15px;background:rgba(255,255,255,.03);color:#ffffff !important;-webkit-text-fill-color:#ffffff !important;font-family:'Geist',sans-serif;font-weight:500;outline:none;transition:.3s}
.field input::placeholder{color:#5e5e66;-webkit-text-fill-color:#5e5e66}
.field input:focus{border-color:#007AFF;background:rgba(0,122,255,.06);box-shadow:0 0 0 4px rgba(0,122,255,.15);animation:borderGlow 2s ease-in-out infinite}
.field input:-webkit-autofill{-webkit-text-fill-color:#ffffff !important;-webkit-box-shadow:0 0 0 1000px rgba(20,20,22,.99) inset !important}
.fi{position:absolute;left:16px;top:18px;color:#5e5e66;pointer-events:none;transition:.3s}
.field input:focus~.fi{color:#007AFF;transform:scale(1.1)}
.field input.err{border-color:#ff4d4d;box-shadow:0 0 0 4px rgba(255,77,77,.15)}
.fe{margin:8px 4px 4px;font-size:13px;color:#ff7070;text-align:left;display:none;animation:shake .3s}
.fe.show{display:block}
.fe a{color:#007AFF;text-decoration:underline;cursor:pointer;font-weight:600}
.consent{display:flex;align-items:flex-start;gap:10px;margin:14px 0 6px;padding:0 4px;text-align:left}
.consent input[type="checkbox"]{width:18px;height:18px;margin-top:1px;accent-color:#007AFF;flex-shrink:0;cursor:pointer}
.consent label{font-size:11px;color:#7a7a82;line-height:1.5;cursor:pointer}
.consent label strong{color:#aaa}
.ce{font-size:11px;color:#ff7070;padding:0 4px;margin-bottom:6px;display:none}
.ce.show{display:block;animation:slideUp .3s}
.btn{position:relative;width:100%;background:#007AFF;color:#fff;border:none;padding:18px;border-radius:14px;font-weight:700;font-size:15px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;margin-top:6px;overflow:hidden;font-family:inherit;transition:.15s;box-shadow:0 8px 24px -4px rgba(0,122,255,.5)}
.btn:active:not(:disabled){transform:scale(.98)}.btn:disabled{opacity:.6;cursor:not-allowed}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 3s ease-in-out infinite}
.btn-c{position:relative;display:inline-flex;align-items:center;gap:8px}
.btn .arrow{transition:transform .3s}.btn:hover:not(:disabled) .arrow{transform:translateX(4px)}
.btn.ld .btn-c{opacity:0}
.btn.ld::after{content:'';position:absolute;width:20px;height:20px;top:50%;left:50%;margin:-10px 0 0 -10px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.conn{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.conn.show{display:flex;animation:fadeIn .3s}
.conn-in{text-align:center;padding:32px}
.wp{position:relative;width:140px;height:140px;margin:0 auto 36px;display:flex;align-items:center;justify-content:center}
.wp .ring{position:absolute;border:2px solid #007AFF;border-radius:50%;opacity:0;animation:sonar 2.4s cubic-bezier(.2,.8,.2,1) infinite}
.wp .ring:nth-child(1){animation-delay:0s}.wp .ring:nth-child(2){animation-delay:.6s}.wp .ring:nth-child(3){animation-delay:1.2s}
.wp .core{position:relative;z-index:2;width:36px;height:36px;border-radius:50%;background:#007AFF;box-shadow:0 0 24px rgba(0,122,255,.5);animation:cp 1.6s ease-in-out infinite;display:flex;align-items:center;justify-content:center}
.conn-st{color:#fff;font-size:13px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;transition:opacity .25s}
.conn-st.fade{opacity:0}
.conn-bar{width:200px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;margin:18px auto 0;overflow:hidden;position:relative}
.conn-bar::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,#007AFF,transparent);animation:scan 1.6s ease-in-out infinite}
.foot{margin-top:20px;font-size:11px;color:#5e5e66;letter-spacing:.08em;text-transform:uppercase;opacity:0;animation:rise .9s .45s cubic-bezier(.2,.8,.2,1) forwards}
.ok{display:none;position:relative;background:rgba(20,20,22,.6);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:28px 24px;text-align:left;overflow:hidden}
.ok.show{display:block;animation:rise .7s cubic-bezier(.2,.8,.2,1) both}
.ok::before{content:'';position:absolute;inset:0;border-radius:22px;padding:1px;background:linear-gradient(135deg,#007AFF,transparent 50%,#007AFF);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.ok-h{display:flex;align-items:center;gap:10px;margin-bottom:20px;color:#007AFF;font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.ok-h .dot{width:8px;height:8px;border-radius:50%;background:#007AFF;box-shadow:0 0 10px rgba(0,122,255,.5);animation:blink 1.5s ease-in-out infinite}
.cr{margin-bottom:18px;animation:slideUp .5s ease both}.cr:nth-child(2){animation-delay:.1s}.cr:nth-child(4){animation-delay:.2s}
.cr:last-of-type{margin-bottom:0}
.lb{color:#8a8a92;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;font-weight:500}
.vl{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:#fff;user-select:all;-webkit-user-select:all}
.dv{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:18px 0}
.ok-f{display:flex;align-items:center;gap:8px;color:#007AFF;font-size:13px;font-weight:500;animation:slideUp .5s .3s ease both}
.wf{display:inline-flex;align-items:flex-end;gap:2px;height:14px}
.wf span{width:3px;background:#007AFF;border-radius:1px;animation:bars 1.4s ease-in-out infinite}
.wf span:nth-child(1){height:4px}.wf span:nth-child(2){height:8px;animation-delay:.15s}.wf span:nth-child(3){height:12px;animation-delay:.3s}.wf span:nth-child(4){height:14px;animation-delay:.45s}
@media(max-height:700px){h1{font-size:44px}.logo-wrap{margin-bottom:24px}.sub{margin-bottom:24px}}
</style>
</head>
<body>
<div class="aurora"><div class="a3"></div></div>
<div class="grid"></div><div class="grain"></div><div class="pts" id="pts"></div>
<div class="card">
  <div id="login">
    <div class="logo-wrap"><div class="logo"><span class="logo-dot"></span>VIRA<span style="color:#007AFF">LLC</span></div></div>
    <h1>Welcome <em>in.</em></h1>
    <p class="sub">Sign in to unlock guest Wi-Fi<br>and exclusive partner benefits.</p>
    <div class="panel">
      <div class="field"><input type="text" id="inp-n" placeholder="Your name" required autocomplete="name"><svg class="fi" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <div class="field"><input type="email" id="inp-e" placeholder="Email address" required autocomplete="email"><svg class="fi" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg><div class="fe" id="fe"></div></div>
      <div class="consent"><input type="checkbox" id="ck" checked><label for="ck">I agree to receive a <strong>one-time feedback email</strong> about my visit. My information may be used for personalized offers and service improvements. I can unsubscribe at any time.</label></div>
      <div class="ce" id="ce">Please agree to continue.</div>
      <button class="btn" id="btn" onclick="go()"><span class="btn-c">Connect Now <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span></button>
    </div>
    <p class="foot">Secured · Encrypted · Instant Access</p>
  </div>
  <div id="success" class="ok">
    <div class="ok-h"><span class="dot"></span> Connected</div>
    <div class="cr"><div class="lb">Network</div><div class="vl" id="wifi-n">—</div></div>
    <div class="dv"></div>
    <div class="cr"><div class="lb">Password</div><div class="vl" id="wifi-p">—</div></div>
    <div class="dv"></div>
    <div class="ok-f"><span class="wf"><span></span><span></span><span></span><span></span></span>You're now logged in.</div>
  </div>
</div>
<div class="conn" id="conn"><div class="conn-in"><div class="wp"><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="core"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg></div></div><div class="conn-st" id="st">Establishing secure link…</div><div class="conn-bar"></div></div></div>
<script>
// ══════════════════════════════════════════
// ⬇️ PASTE YOUR APPS SCRIPT /exec URL ⬇️
var API = "https://script.google.com/macros/s/AKfycbxhpyZsVzPeMrE5_Wr9_ebiAAe7D0WNKmGCNbr-URZ4rXeyLI7ojM4mesBUAIQ6H44n/exec";
// ══════════════════════════════════════════

!function(){for(var c=document.getElementById('pts'),i=0;i<14;i++){var p=document.createElement('div');p.className='pt';p.style.left=Math.random()*100+'vw';p.style.animationDelay=Math.random()*14+'s';p.style.animationDuration=10+Math.random()*8+'s';c.appendChild(p)}}();
var eI=document.getElementById('inp-e'),eE=document.getElementById('fe');
function clr(){eE.classList.remove('show');eI.classList.remove('err')}
function err(m){eE.textContent=m;eE.classList.add('show');eI.classList.add('err')}
function chk(){var v=eI.value.trim();clr();if(!v)return false;if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){err("That doesn't look right — check the format.");return false}return true}
eI.addEventListener('input',clr);
var conn=document.getElementById('conn'),stEl=document.getElementById('st'),sT;
var SEQ=["Establishing secure link…","Verifying credentials…","Authorizing device…","Almost there…"];
function showC(){conn.classList.add('show');var i=0;stEl.textContent=SEQ[0];sT=setInterval(function(){i=(i+1)%SEQ.length;stEl.classList.add('fade');setTimeout(function(){stEl.textContent=SEQ[i];stEl.classList.remove('fade')},250)},1400)}
function hideC(){conn.classList.remove('show');if(sT){clearInterval(sT);sT=null}}
document.getElementById('inp-n').onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();eI.focus()}};
eI.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();go()}};

function go(){
  if(!chk()){eI.focus();return}
  var ck=document.getElementById('ck'),ce=document.getElementById('ce');ce.classList.remove('show');
  if(!ck.checked){ce.classList.add('show');return}
  var btn=document.getElementById('btn');btn.classList.add('ld');btn.disabled=true;
  var t0=Date.now();showC();

  // USE GET — no CORS issues, no preflight, works everywhere
  var payload=encodeURIComponent(JSON.stringify({
    action:'processGuest',
    name:document.getElementById('inp-n').value.trim(),
    email:eI.value.trim()
  }));

  fetch(API+'?data='+payload)
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.error)throw new Error(d.error);
    if(d.wifi){document.getElementById('wifi-n').textContent=d.wifi.network;document.getElementById('wifi-p').textContent=d.wifi.password}
    var w=Math.max(0,1800-(Date.now()-t0));
    setTimeout(function(){hideC();document.getElementById('login').style.display='none';document.getElementById('success').classList.add('show')},w);
  })
  .catch(function(e){hideC();err(e.message||"Something went wrong.");eI.focus();btn.classList.remove('ld');btn.disabled=false});
}
</script>
</body>
</html>
