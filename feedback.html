<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>We're listening</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;overscroll-behavior:none}
body{font-family:'Geist',-apple-system,sans-serif;background:#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.aurora::before,.aurora::after{content:'';position:absolute;width:600px;height:600px;border-radius:50%;filter:blur(120px);opacity:.5;will-change:transform}
.aurora::before{background:radial-gradient(circle,#007AFF 0%,transparent 70%);top:-200px;left:-150px;animation:d1 18s ease-in-out infinite}
.aurora::after{background:radial-gradient(circle,#0051a8 0%,transparent 70%);bottom:-250px;right:-150px;animation:d2 22s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(80px,60px) scale(1.15)}}
@keyframes d2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-100px,-80px) scale(1.2)}}
.ripple{position:fixed;z-index:1;pointer-events:none;border-radius:50%;border:1px solid rgba(0,122,255,.18)}
.r1{width:320px;height:320px;top:-120px;right:-120px;animation:pr 6s ease-out infinite}
.r2{width:460px;height:460px;top:-180px;right:-180px;animation:pr 6s ease-out infinite 1.5s}
.r3{width:280px;height:280px;bottom:-100px;left:-100px;animation:pr 7s ease-out infinite .8s}
@keyframes pr{0%{opacity:.4;transform:scale(.85)}100%{opacity:0;transform:scale(1.1)}}
.grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse,#000 30%,transparent 75%);-webkit-mask-image:radial-gradient(ellipse,#000 30%,transparent 75%)}
@keyframes rise{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes ringPulse{0%{opacity:.7;transform:scale(.95)}100%{opacity:0;transform:scale(1.4)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes borderGlow{0%,100%{border-color:rgba(0,122,255,.15)}50%{border-color:rgba(0,122,255,.4)}}
@keyframes checkDraw{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.card{position:relative;z-index:10;width:100%;max-width:420px;text-align:center}
.icon-wrap{margin-bottom:22px;opacity:0;animation:rise .9s .05s cubic-bezier(.2,.8,.2,1) forwards}
.icon-c{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:rgba(0,122,255,.1);color:#007AFF;position:relative;border:1px solid rgba(0,122,255,.2)}
.icon-c::before,.icon-c::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(0,122,255,.3);animation:ringPulse 2.5s ease-out infinite}
.icon-c::after{animation-delay:1.25s}
h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:52px;line-height:1;letter-spacing:-.02em;margin-bottom:14px;opacity:0;animation:rise .9s .15s cubic-bezier(.2,.8,.2,1) forwards}
h1 em{font-style:italic;color:#007AFF;position:relative}
h1 em::after{content:'';position:absolute;inset:-8px -4px;background:#007AFF;filter:blur(28px);opacity:.35;z-index:-1;border-radius:8px}
.sub{color:#8a8a92;margin-bottom:32px;font-size:15px;line-height:1.55;opacity:0;animation:rise .9s .25s cubic-bezier(.2,.8,.2,1) forwards}
.panel{position:relative;background:rgba(20,20,22,.6);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px;text-align:left;opacity:0;animation:rise .9s .35s cubic-bezier(.2,.8,.2,1) forwards}
.panel::before{content:'';position:absolute;inset:0;border-radius:22px;padding:1px;background:linear-gradient(135deg,rgba(0,122,255,.4),transparent 40%,transparent 60%,rgba(0,122,255,.2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.fl{display:block;font-size:11px;color:#8a8a92;margin-bottom:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;padding-left:4px}
textarea{width:100%;padding:16px 18px;border:1px solid rgba(255,255,255,.06);border-radius:14px;font-size:15px;background:rgba(255,255,255,.03);color:#fff !important;-webkit-text-fill-color:#fff !important;font-family:'Geist',sans-serif;line-height:1.55;outline:none;resize:vertical;min-height:130px;transition:.3s}
textarea::placeholder{color:#5e5e66;font-style:italic;-webkit-text-fill-color:#5e5e66}
textarea:focus{border-color:#007AFF;background:rgba(0,122,255,.04);box-shadow:0 0 0 4px rgba(0,122,255,.15);animation:borderGlow 2s ease-in-out infinite}
.counter{text-align:right;font-size:11px;color:#5e5e66;margin-top:8px;padding-right:4px}
.or-div{display:flex;align-items:center;gap:12px;margin:18px 0 0;color:#5e5e66;font-size:11px}.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.g-link{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px;padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;text-decoration:none;transition:.3s}
.g-link:hover{border-color:rgba(0,122,255,.3);background:rgba(0,122,255,.04);transform:translateY(-1px)}
.g-link .gt{font-size:13px;color:#8a8a92}.g-link .gt strong{color:#fff}
.g-link .ga{color:#007AFF;font-size:16px;transition:transform .3s}.g-link:hover .ga{transform:translateX(3px)}
.btn{position:relative;width:100%;background:#007AFF;color:#fff;border:none;padding:18px;border-radius:14px;font-weight:700;font-size:14px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;margin-top:14px;overflow:hidden;font-family:inherit;box-shadow:0 8px 24px -4px rgba(0,122,255,.5)}
.btn:active:not(:disabled){transform:scale(.98)}.btn:disabled{opacity:.6;cursor:not-allowed}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 3s ease-in-out infinite}
.btn-c{position:relative;display:inline-flex;align-items:center;gap:10px}
.btn .arrow{transition:transform .3s}
.btn:hover:not(:disabled) .arrow{transform:translateX(4px)}
.btn.ld .btn-c{opacity:0}
.btn.ld::after{content:'';position:absolute;width:20px;height:20px;top:50%;left:50%;margin:-10px 0 0 -10px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.foot{margin-top:22px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;color:#5e5e66;letter-spacing:.08em;text-transform:uppercase;opacity:0;animation:rise .9s .45s cubic-bezier(.2,.8,.2,1) forwards}
.foot svg{color:#007AFF;opacity:.7}
.thanks{padding:8px 0;text-align:center;animation:rise .7s cubic-bezier(.2,.8,.2,1) both}
.thanks-i{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border-radius:50%;background:rgba(0,122,255,.1);border:1px solid rgba(0,122,255,.3);color:#007AFF;margin-bottom:22px;box-shadow:0 0 30px rgba(0,122,255,.3)}
.thanks-i svg{animation:checkDraw .6s cubic-bezier(.2,.8,.2,1) .2s both}
.thanks h1{margin-bottom:14px;opacity:1;animation:none}
.thanks p{color:#8a8a92;font-size:15px;line-height:1.6;margin:0 auto;max-width:320px}
.thanks-g{display:inline-flex;align-items:center;gap:10px;margin-top:24px;padding:14px 24px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;text-decoration:none;transition:.3s}
.thanks-g:hover{border-color:#007AFF;background:rgba(0,122,255,.06);transform:translateY(-1px)}
.thanks-g span{font-size:14px;color:#fff;font-weight:600}
.thanks-g .arr{color:#007AFF;font-size:18px;transition:transform .3s}.thanks-g:hover .arr{transform:translateX(4px)}
@media(max-height:740px){h1{font-size:42px}.icon-wrap{margin-bottom:16px}.sub{margin-bottom:24px}}
</style>
</head>
<body>
<div class="aurora"></div><div class="grid"></div>
<div class="ripple r1"></div><div class="ripple r2"></div><div class="ripple r3"></div>
<div class="card" id="box">
  <div class="icon-wrap"><div class="icon-c"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div></div>
  <h1>We're <em>listening.</em></h1>
  <p class="sub">Your experience matters. Tell us<br>how we can make it right.</p>
  <div class="panel">
    <label class="fl">What can we improve?</label>
    <textarea id="ta" rows="4" placeholder="Share what happened — every detail helps us make it right." required maxlength="1000"></textarea>
    <div class="counter"><span id="ct">0</span> / 1000</div>
    <button class="btn" id="btn" onclick="send()"><span class="btn-c">Send to Manager <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span></button>
    <div class="or-div">or</div>
    <a id="g-pre" class="g-link" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      <div class="gt">Prefer to <strong>post publicly on Google</strong> instead?</div>
      <span class="ga">→</span>
    </a>
  </div>
  <div class="foot"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>Read personally · Usually within the hour</span></div>
</div>
<script>
// ══════════════════════════════════════════════
var API = "https://script.google.com/macros/s/AKfycbwuFMR39KsNCeihvPts67eF4FDuML5n0kF5KS1-cAc6PS6Z6_szJQOucUm1Qr_OsD_9/exec";
var GOOGLE_REVIEW_URL = "linkedin.com/company/viraleyemediaandanlytics/";
// ══════════════════════════════════════════════

// Read email & rating from URL
var params = new URLSearchParams(window.location.search);
var gEmail = params.get('email') || '';
var gRating = params.get('rating') || '';

// Set Google review link
document.getElementById('g-pre').href = GOOGLE_REVIEW_URL;

// Counter
var ta = document.getElementById('ta'), ct = document.getElementById('ct');
ta.addEventListener('input', function(){ ct.textContent = ta.value.length; });

function send(){
  var text = ta.value.trim();
  if(!text){ ta.focus(); return; }
  var btn = document.getElementById('btn');
  btn.classList.add('ld'); btn.disabled = true;

  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'processFeedback',
      email: gEmail,
      rating: gRating,
      complaint: text
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d.error) throw new Error(d.error);
    document.getElementById('box').innerHTML =
      '<div class="thanks">'
      +'<div class="icon-wrap" style="opacity:1;animation:none"><div class="thanks-i"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div></div>'
      +'<h1>Thank <em>you.</em></h1>'
      +'<p>Your feedback has been sent directly to our manager. We appreciate you — and we\'ll make it right.</p>'
      +'<div class="or-div" style="max-width:280px;margin:24px auto 0">or</div>'
      +'<div style="text-align:center;margin-top:14px">'
      +'<a href="'+GOOGLE_REVIEW_URL+'" class="thanks-g" target="_blank">'
      +'<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>'
      +'<span>Post on Google Reviews</span>'
      +'<span class="arr">&rarr;</span>'
      +'</a></div></div>';
  })
  .catch(function(e){
    alert("Couldn't send: " + (e.message || "Try again."));
    btn.classList.remove('ld'); btn.disabled = false;
  });
}
</script>
</body>
</html>
